<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚餐點餐結算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f1e9;
    --ink:#232019;
    --green:#17493a;
    --green-soft:#e3ede7;
    --amber:#e0952b;
    --amber-deep:#b56f12;
    --danger:#c0492f;
    --line:#cbc4b4;
    --muted:#8b8271;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 30px rgba(35,32,25,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:
      radial-gradient(circle at 20% -10%,#fbf9f3,transparent 55%),
      radial-gradient(circle at 100% 0%,#eef3ef,transparent 45%),
      #ece7db;
    color:var(--ink);
    min-height:100vh;
    padding:24px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:640px;margin:0 auto}

  /* 抬頭 */
  header{text-align:center;margin-bottom:20px}
  .stamp{
    display:inline-block;font-size:12px;letter-spacing:.35em;font-weight:700;
    color:var(--green);border:1.5px solid var(--green);border-radius:4px;
    padding:4px 12px 4px 14px;transform:rotate(-2deg);margin-bottom:14px;
  }
  header h1{font-size:30px;font-weight:900;letter-spacing:.02em;line-height:1.1}
  header .sub{margin-top:8px;color:var(--muted);font-size:13px;font-weight:500}
  header .sub b{color:var(--green);font-weight:700}

  /* 共用帳單 */
  .conn{padding:14px 18px}
  .conn-row{display:flex;gap:8px;align-items:center}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:none;transition:.2s}
  .dot.on{background:#2fb36b;box-shadow:0 0 0 3px rgba(47,179,107,.2)}
  .conn-status{font-size:14px;font-weight:700;color:var(--green)}
  .conn-status.off{color:var(--muted)}
  .conn-row input{
    flex:1;min-width:0;font-family:inherit;font-size:15px;color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fff;
  }
  .conn-row input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(23,73,58,.12)}
  .conn-row input[readonly]{background:var(--green-soft);font-weight:700;letter-spacing:.06em;cursor:default}
  .conn-row button{
    font-family:inherit;font-size:14px;font-weight:700;border-radius:9px;padding:10px 14px;
    cursor:pointer;border:1px solid var(--green);background:var(--green);color:#fff;flex:none;transition:.15s;
  }
  .conn-row button:hover{background:#0f3a2d}
  .conn-row button.ghost{background:#fff;color:var(--green)}
  .conn-row button.ghost:hover{background:var(--green-soft)}
  .conn-row button:disabled{opacity:.45;cursor:not-allowed}
  .conn-hint{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.55}
  .conn-hint.warn{color:var(--amber-deep)}
  .conn-hint b{color:var(--green)}

  /* 卡片 */
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .card + .card{margin-top:18px}

  /* 輸入區 */
  .entry{padding:18px}
  .entry .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:700;color:var(--muted);padding-left:2px}
  .field label em{color:var(--danger);font-style:normal;font-weight:900}
  .field input{
    font-family:inherit;font-size:16px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:9px;
    padding:11px 12px;width:100%;transition:border-color .15s,box-shadow .15s;
  }
  .field input.mono{font-family:"JetBrains Mono",monospace}
  .field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(23,73,58,.12)}
  .field.full{margin-top:10px}
  .svc-toggle{
    display:flex;align-items:center;gap:10px;margin-top:14px;cursor:pointer;
    user-select:none;background:var(--green-soft);border:1px solid transparent;
    border-radius:10px;padding:11px 13px;transition:.15s;
  }
  .svc-toggle:hover{border-color:var(--green)}
  .svc-toggle .t{font-size:14px;font-weight:700;color:var(--green);flex:1}
  .svc-toggle .v{font-size:13px;font-weight:700;color:var(--amber-deep)}
  .svc-toggle.off{background:#fff;border-color:var(--line)}
  .svc-toggle.off .t{color:var(--muted)}
  .svc-toggle.off .v{color:var(--muted);opacity:.7}
  .svc-toggle input[type=checkbox]{
    appearance:none;-webkit-appearance:none;width:20px;height:20px;flex:none;
    border:2px solid var(--line);border-radius:6px;background:#fff;
    cursor:pointer;position:relative;transition:.15s;
  }
  .svc-toggle input[type=checkbox]:checked{background:var(--green);border-color:var(--green)}
  .svc-toggle input[type=checkbox]:checked::after{
    content:"✓";position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;color:#fff;font-size:13px;font-weight:900;
  }
  .svc-toggle input[type=checkbox]:focus-visible{outline:2px solid var(--green);outline-offset:2px}

  .add-btn{
    margin-top:14px;width:100%;font-family:inherit;font-size:16px;font-weight:700;
    color:#fff;background:var(--green);border:none;border-radius:10px;padding:13px;
    cursor:pointer;transition:transform .05s,background .15s;letter-spacing:.05em;
  }
  .add-btn:hover{background:#0f3a2d}
  .add-btn:active{transform:translateY(1px)}

  /* 分頁 */
  .tabs{display:flex;gap:8px;margin:18px 0}
  .tabs button{
    flex:1;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
    background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:11px;padding:11px;transition:.15s;
  }
  .tabs button:hover{border-color:var(--green);color:var(--green)}
  .tabs button.on{background:var(--green);border-color:var(--green);color:#fbf9f3}

  .mini-clear{
    font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
    background:transparent;border:1px solid #e3c4bc;color:var(--danger);
    border-radius:8px;padding:6px 11px;transition:.15s;
  }
  .mini-clear:hover{background:#f6dfd9;border-color:var(--danger)}
  .mini-clear.confirm{background:var(--danger);border-color:var(--danger);color:#fff}

  /* 座位圖 */
  #seatArea{padding:6px 14px 16px}
  .tbl{margin-top:12px}
  .tbl-head{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 10px}
  .tbl-head .n{font-size:15px;font-weight:900;color:var(--green)}
  .tbl-head .n small{font-size:12px;font-weight:700;color:var(--muted);margin-left:7px}
  .tbl-head .x{
    border:none;background:transparent;color:var(--muted);cursor:pointer;
    width:26px;height:26px;border-radius:7px;font-size:14px;transition:.15s;
  }
  .tbl-head .x:hover{background:#f6dfd9;color:var(--danger)}
  .round{
    position:relative;width:290px;height:290px;margin:0 auto 6px;
  }
  .round .top{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:118px;height:118px;border-radius:50%;
    background:var(--green-soft);border:2px dashed var(--green);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  }
  .round .top .t1{font-size:19px;font-weight:900;color:var(--green);line-height:1}
  .round .top .t2{font-size:11px;font-weight:700;color:var(--muted)}
  .seat{
    position:absolute;width:62px;height:62px;border-radius:50%;
    transform:translate(-50%,-50%);cursor:pointer;
    border:1.5px solid var(--line);background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:3px;transition:.15s;overflow:hidden;
  }
  .seat:hover{border-color:var(--green);box-shadow:0 3px 10px rgba(23,73,58,.16)}
  .seat.filled{background:var(--green);border-color:var(--green)}
  .seat .nm{
    font-size:12px;font-weight:700;color:var(--muted);line-height:1.15;
    text-align:center;word-break:break-all;max-height:28px;overflow:hidden;
  }
  .seat.filled .nm{color:#fbf9f3}
  .seat .sp{
    font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;
    color:var(--amber);margin-top:2px;
  }
  @media(max-width:400px){
    .round{width:250px;height:250px}
    .seat{width:54px;height:54px}
    .seat .nm{font-size:11px}
  }
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 18px;border-bottom:1px dashed var(--line);flex-wrap:wrap;
  }
  .seg{display:inline-flex;flex-wrap:wrap;background:var(--green-soft);border-radius:9px;padding:3px}
  .seg button{
    font-family:inherit;font-size:13px;font-weight:700;color:var(--green);
    background:transparent;border:none;border-radius:7px;padding:7px 11px;cursor:pointer;
  }
  .seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .count{font-size:13px;color:var(--muted);font-weight:500}

  /* 明細 */
  .list{padding:6px 0}
  .empty{padding:44px 24px;text-align:center;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:10px}
  .empty p{font-size:14px;line-height:1.6}

  .group-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    padding:14px 18px 8px;
  }
  .group-head .g-name{font-size:15px;font-weight:900;color:var(--green)}
  .group-head .g-name .tag{
    font-size:11px;font-weight:700;color:var(--amber-deep);background:#faf0dc;
    border-radius:20px;padding:2px 9px;margin-left:7px;vertical-align:2px;
  }
  .group-head .g-sub{font-size:14px;font-weight:700;color:var(--muted)}
  .group-head .g-sub b{color:var(--ink)}
  .dashed{border-bottom:1px dashed var(--line);margin:0 18px}

  .item{
    display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;
    padding:11px 18px;
  }
  .item:hover{background:rgba(23,73,58,.03)}
  .item .who{font-size:13px;color:var(--muted);font-weight:500}
  .item .what{font-size:15px;font-weight:500;margin-top:1px}
  .item .amt{font-size:15px;font-weight:700}
  .item .del{
    width:28px;height:28px;border:none;background:transparent;color:var(--muted);
    border-radius:7px;cursor:pointer;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .item .del:hover{background:#f6dfd9;color:var(--danger)}
  .item .ops{display:flex;gap:2px}
  .item .edit{
    width:28px;height:28px;border:none;background:transparent;color:var(--muted);
    border-radius:7px;cursor:pointer;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .item .edit:hover{background:var(--green-soft);color:var(--green)}

  /* 編輯彈窗 */
  .modal-mask{position:fixed;inset:0;background:rgba(35,32,25,.5);display:flex;
    align-items:center;justify-content:center;padding:20px;z-index:60}
  .modal-mask[hidden]{display:none}
  .modal{background:var(--paper);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 20px 60px rgba(35,32,25,.3);width:100%;max-width:400px;padding:22px}
  .modal h3{font-size:18px;font-weight:900;margin-bottom:16px;color:var(--green)}
  .modal .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal .field.full{margin-top:10px}
  .modal .m-actions{display:flex;gap:10px;margin-top:18px}
  .modal .m-actions button{flex:1;font-family:inherit;font-size:15px;font-weight:700;
    cursor:pointer;border-radius:10px;padding:12px;transition:.15s}
  .modal .m-cancel{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .modal .m-cancel:hover{border-color:var(--muted)}
  .modal .m-save{background:var(--green);border:none;color:#fff}
  .modal .m-save:hover{background:#0f3a2d}

  /* 總計 */
  .total{background:var(--green);color:#fbf9f3;padding:20px 22px}
  .total .line{display:flex;justify-content:space-between;align-items:center}
  .total .line + .line{margin-top:6px}
  .total .k{font-size:14px;font-weight:500;opacity:.8}
  .total .v{font-size:15px;font-weight:700;opacity:.9}
  .total .grand{border-top:1.5px dashed rgba(255,255,255,.3);margin-top:12px;padding-top:14px}
  .total .grand .k{font-size:16px;font-weight:700;opacity:1}
  .total .grand .v{font-size:34px;font-weight:700;letter-spacing:-.01em}
  .total .grand .v small{font-size:18px;opacity:.7;margin-right:3px}
  .total .line.subtotal .k,.total .line.subtotal .v{opacity:.75}

  /* 底部動作 */
  .actions{display:flex;gap:10px;padding:16px 18px}
  .actions button{
    flex:1;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
    border-radius:9px;padding:11px;border:1px solid var(--line);background:#fff;color:var(--ink);
    transition:.15s;
  }
  .actions button:hover{border-color:var(--green);color:var(--green)}
  .actions .clear{color:var(--danger);border-color:#e3c4bc}
  .actions .clear:hover{background:#f6dfd9;border-color:var(--danger);color:var(--danger)}
  .actions .clear.confirm{background:var(--danger);color:#fff;border-color:var(--danger)}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:#fbf9f3;font-size:14px;font-weight:500;
    padding:12px 20px;border-radius:30px;box-shadow:0 8px 24px rgba(0,0,0,.25);
    opacity:0;transition:.28s;pointer-events:none;z-index:50;
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  @media(max-width:480px){
    header h1{font-size:26px}
    .total .grand .v{font-size:29px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="stamp">聚餐帳單</div>
    <h1>聚餐點餐結算</h1>
    <div class="sub" id="metaLine">尚無紀錄</div>
  </header>

  <!-- 雲端同步狀態 -->
  <div class="card conn">
    <div class="conn-row">
      <span class="dot" id="connDot"></span>
      <span class="conn-status off" id="connStatus">連線中…</span>
    </div>
    <div class="conn-hint" id="connHint">所有人開啟這個網頁即共用同一份帳單</div>
  </div>

  <!-- 分頁 -->
  <div class="tabs" id="tabs">
    <button data-page="order" class="on">🍽️ 點餐</button>
    <button data-page="seat">🪑 座位圖</button>
  </div>

  <div id="pageOrder">

  <!-- 輸入 -->
  <div class="card">
    <div class="entry">
      <div class="row">
        <div class="field">
          <label for="fTable">桌號 <em>*</em></label>
          <input id="fTable" class="mono" placeholder="1" autocomplete="off">
        </div>
        <div class="field">
          <label for="fName">姓名 <em>*</em></label>
          <input id="fName" placeholder="小明" autocomplete="off">
        </div>
      </div>
      <div class="field full">
        <label for="fItem">餐點內容 <em>*</em></label>
        <input id="fItem" placeholder="滷肉飯、燙青菜…" autocomplete="off">
      </div>
      <div class="field full">
        <label for="fAmt">金額 <em>*</em></label>
        <input id="fAmt" class="mono" type="number" inputmode="decimal" min="0" step="1" placeholder="60" autocomplete="off">
      </div>
      <label class="svc-toggle off" id="svcLine">
        <input type="checkbox" id="svcChk">
        <span class="t">加收服務費 10%</span>
        <span class="v mono" id="svcHint">未加收</span>
      </label>
      <button class="add-btn" id="addBtn">＋ 新增一筆</button>
    </div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <div class="toolbar">
      <div class="seg" id="seg">
        <button data-mode="table" class="on">依桌號</button>
        <button data-mode="name">依姓名</button>
        <button data-mode="item">依餐點</button>
        <button data-mode="none">全部</button>
      </div>
      <span class="count" id="countLbl">0 筆</span>
    </div>
    <div class="list" id="list"></div>
  </div>

  <!-- 總計 -->
  <div class="card">
    <div class="total">
      <div class="line"><span class="k">餐點筆數</span><span class="v mono" id="tCount">0</span></div>
      <div class="line"><span class="k">用餐桌數</span><span class="v mono" id="tTables">0</span></div>
      <div class="line"><span class="k">用餐人數</span><span class="v mono" id="tPeople">0</span></div>
      <div class="line subtotal" id="subtotalLine" hidden><span class="k">餐點小計</span><span class="v mono"><small>$</small><span id="tSub">0</span></span></div>
      <div class="line subtotal" id="svcFeeLine" hidden>
        <span class="k">服務費 10%</span>
        <span class="v mono"><small>$</small><span id="svcAmt">0</span></span>
      </div>
      <div class="line grand"><span class="k">總計</span><span class="v mono"><small>$</small><span id="tGrand">0</span></span></div>
    </div>
    <div class="actions">
      <button id="exportBtn">匯出 CSV</button>
      <button class="clear" id="clearBtn">清空全部</button>
    </div>
  </div>
  </div><!-- /pageOrder -->

  <!-- 座位圖 -->
  <div id="pageSeat" hidden>
    <div class="card">
      <div class="entry">
        <div class="row">
          <div class="field">
            <label for="sTable">桌號 <em>*</em></label>
            <input id="sTable" class="mono" placeholder="1" autocomplete="off">
          </div>
          <div class="field">
            <label for="sCount">座位數 <em>*</em></label>
            <input id="sCount" class="mono" type="number" min="1" max="20" step="1" placeholder="10" autocomplete="off">
          </div>
        </div>
        <button class="add-btn" id="addTableBtn">＋ 新增一桌</button>
        <div class="conn-hint" style="margin-top:10px">點座位即可填寫姓名,填過的名字會自動帶出該人的點餐金額。</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <span class="count" id="seatCountLbl">0 桌</span>
        <button class="mini-clear" id="clearSeatBtn">清空座位圖</button>
      </div>
      <div id="seatArea"></div>
    </div>
  </div>
</div><!-- /wrap -->

<div class="modal-mask" id="seatMask" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="seatTitle">填寫座位</h3>
    <div class="field full" style="margin-top:0">
      <label for="sName">姓名</label>
      <input id="sName" placeholder="留空可清除此座位" autocomplete="off">
    </div>
    <div class="m-actions">
      <button class="m-cancel" id="sCancel">取消</button>
      <button class="m-save" id="sSave">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-mask" id="editMask" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <h3>編輯這一筆</h3>
    <div class="row">
      <div class="field">
        <label for="eTable">桌號 <em>*</em></label>
        <input id="eTable" class="mono" autocomplete="off">
      </div>
      <div class="field">
        <label for="eName">姓名 <em>*</em></label>
        <input id="eName" autocomplete="off">
      </div>
    </div>
    <div class="field full">
      <label for="eItem">餐點內容</label>
      <input id="eItem" autocomplete="off">
    </div>
    <div class="field full">
      <label for="eAmt">金額</label>
      <input id="eAmt" class="mono" type="number" inputmode="decimal" min="0" step="1" autocomplete="off">
    </div>
    <div class="m-actions">
      <button class="m-cancel" id="eCancel">取消</button>
      <button class="m-save" id="eSave">儲存修改</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ▼▼▼ 貼上你的 Google Apps Script 網頁應用程式網址(部署後結尾為 /exec) ▼▼▼ */
  var API_URL = "https://script.google.com/macros/s/AKfycbyuls6VD-LfWgp892qFroqstUcCJK61JzYM6mtwoCYz0NUCdtHUasWVGcYRH4WmsE-D/exec";
  /* ▲▲▲ 留空則維持單機模式;填好後即可多人共用同一份帳單 ▲▲▲ */

  var KEY = "feast-orders-v1";
  var SEAT_KEY = "feast-seats-v1";
  var records = load();
  var seats = loadSeats();
  var page = "order";
  var seatEditing = null;
  var mode = "table";
  var svc = localStorage.getItem("feast-svc") === "1";
  var SVC_RATE = 0.10;
  var clearArmed = false;
  var editingId = null;

  var online = false, billCode = "";
  var FIXED_BILL = "feast-shared";
  var pollTimer = null;
  var POLL_MS = 3000;

  function backendReady(){
    return !!(API_URL && API_URL.indexOf("http") === 0);
  }
  var clearTimer = null;

  var $ = function(id){ return document.getElementById(id); };
  var fTable=$("fTable"), fName=$("fName"), fItem=$("fItem"), fAmt=$("fAmt");

  function load(){
    try{ var r = JSON.parse(localStorage.getItem(KEY)); return Array.isArray(r)? r : []; }
    catch(e){ return []; }
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(records)); }catch(e){}
  }
  function loadSeats(){
    try{ var r = JSON.parse(localStorage.getItem(SEAT_KEY)); return Array.isArray(r)? r : []; }
    catch(e){ return []; }
  }
  function saveSeats(){
    if(online){
      apiPost({ action:"seats", bill:billCode, seats: JSON.stringify(seats) })
        .catch(function(){ toast("座位同步失敗"); });
    }else{
      try{ localStorage.setItem(SEAT_KEY, JSON.stringify(seats)); }catch(e){}
    }
    renderSeats();
  }
  function money(n){
    return Math.round(n).toLocaleString("en-US");
  }
  function toast(msg){
    var t=$("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove("show"); },1900);
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function add(){
    var table = fTable.value.trim();
    var name  = fName.value.trim();
    var item  = fItem.value.trim();
    var amt   = parseFloat(fAmt.value);
    if(!table){ toast("請填寫桌號"); fTable.focus(); return; }
    if(!name){ toast("請填寫姓名"); fName.focus(); return; }
    if(!item){ toast("請填寫餐點內容"); fItem.focus(); return; }
    if(isNaN(amt) || amt < 0){ toast("請填寫正確金額"); fAmt.focus(); return; }
    var rec = { table: table, name: name, item: item, amt: amt };
    if(online){
      apiPost({ action:"add", bill:billCode, table:rec.table, name:rec.name, item:rec.item, amt:rec.amt })
        .then(function(){ toast("已新增"); poll(); })
        .catch(function(){ toast("新增失敗,請確認連線"); });
    }else{
      rec.id = Date.now() + "-" + Math.random().toString(36).slice(2,6);
      records.push(rec);
      save(); render();
      toast("已新增");
    }
    // 保留桌號與姓名,方便連續輸入同一人
    fItem.value=""; fAmt.value="";
    fItem.focus();
  }

  function del(id){
    if(online){
      apiPost({ action:"delete", bill:billCode, id:id }).then(poll).catch(function(){ toast("刪除失敗"); });
      return;
    }
    records = records.filter(function(r){ return r.id !== id; });
    save(); render();
  }

  function findRec(id){
    for(var i=0;i<records.length;i++){ if(records[i].id===id) return records[i]; }
    return null;
  }
  function openEdit(id){
    var r = findRec(id); if(!r) return;
    editingId = id;
    $("eTable").value = r.table === "未分桌" ? "" : r.table;
    $("eName").value  = r.name === "—" ? "" : r.name;
    $("eItem").value  = r.item;
    $("eAmt").value   = r.amt;
    $("editMask").hidden = false;
    $("eItem").focus();
  }
  function closeEdit(){ editingId = null; $("editMask").hidden = true; }
  function saveEdit(){
    var table = $("eTable").value.trim();
    var name  = $("eName").value.trim();
    var item  = $("eItem").value.trim();
    var amt   = parseFloat($("eAmt").value);
    if(!table){ toast("請填寫桌號"); $("eTable").focus(); return; }
    if(!name){ toast("請填寫姓名"); $("eName").focus(); return; }
    if(!item){ toast("請填寫餐點內容"); $("eItem").focus(); return; }
    if(isNaN(amt) || amt < 0){ toast("請填寫正確金額"); $("eAmt").focus(); return; }
    var data = { table: table, name: name, item: item, amt: amt };
    if(online){
      apiPost({ action:"update", bill:billCode, id:editingId, table:data.table, name:data.name, item:data.item, amt:data.amt })
        .then(function(){ toast("已更新"); poll(); })
        .catch(function(){ toast("更新失敗"); });
      closeEdit();
      return;
    }
    var r = findRec(editingId); if(!r){ closeEdit(); return; }
    r.table = data.table; r.name = data.name; r.item = data.item; r.amt = data.amt;
    save(); closeEdit(); render(); toast("已更新");
  }

  function groupBy(keyFn){
    var map = {}, order = [];
    records.forEach(function(r){
      var k = keyFn(r);
      if(!map[k]){ map[k]=[]; order.push(k); }
      map[k].push(r);
    });
    return order.map(function(k){ return {key:k, items:map[k]}; });
  }

  function render(){
    var list = $("list");
    var count = records.length;
    var grand = records.reduce(function(s,r){ return s + r.amt; },0);
    var tables = {}, people = {};
    records.forEach(function(r){ tables[r.table]=1; people[r.name==="—"? r.id : r.name]=1; });
    var nTables = Object.keys(tables).length;
    var nPeople = records.filter(function(r){return r.name!=="—";})
                         .reduce(function(m,r){ m[r.name]=1; return m; },{});
    var nPeopleCount = Object.keys(nPeople).length;

    var svcFee = svc ? grand * SVC_RATE : 0;
    var payable = grand + svcFee;

    $("tCount").textContent = count;
    $("tTables").textContent = nTables;
    $("tPeople").textContent = nPeopleCount;
    $("tSub").textContent = money(grand);
    $("svcAmt").textContent = money(svcFee);
    $("tGrand").textContent = money(payable);
    $("subtotalLine").hidden = !svc;
    $("svcFeeLine").hidden = !svc;
    $("svcChk").checked = svc;
    $("svcLine").classList.toggle("off", !svc);
    $("svcHint").textContent = svc ? "+$" + money(svcFee) : "未加收";
    $("countLbl").textContent = count + " 筆";
    $("metaLine").innerHTML = count
      ? "共 <b>"+nTables+"</b> 桌 · <b>"+count+"</b> 筆 · 總計 <b>$"+money(payable)+"</b>"
      : "尚無紀錄";

    if(count === 0){
      list.innerHTML =
        '<div class="empty"><div class="big">🍽️</div>'+
        '<p>還沒有點餐紀錄<br>在上方填寫桌號、姓名、餐點與金額開始</p></div>';
      return;
    }

    var html = "";
    if(mode === "none"){
      html += records.map(rowHtml).join("");
    }else{
      var groups = mode === "table" ? groupBy(function(r){ return r.table; })
                 : mode === "name"  ? groupBy(function(r){ return r.name; })
                 : groupBy(function(r){ return r.item; });
      groups.forEach(function(g){
        var sub = g.items.reduce(function(s,r){ return s + r.amt; },0);
        var label = mode==="table" ? "桌號 "+esc(g.key) : esc(g.key);
        var tag = (mode==="table" || mode==="item")
          ? '<span class="tag">'+g.items.length+(mode==="item"?" 份":" 筆")+'</span>'
          : '';
        html += '<div class="group-head">'+
                  '<span class="g-name">'+label+tag+'</span>'+
                  '<span class="g-sub mono">小計 <b>$'+money(sub)+'</b></span>'+
                '</div>'+
                '<div class="dashed"></div>'+
                g.items.map(rowHtml).join("");
      });
    }
    list.innerHTML = html;
    Array.prototype.forEach.call(list.querySelectorAll(".del"), function(btn){
      btn.addEventListener("click", function(){ del(btn.getAttribute("data-id")); });
    });
    Array.prototype.forEach.call(list.querySelectorAll(".edit"), function(btn){
      btn.addEventListener("click", function(){ openEdit(btn.getAttribute("data-edit")); });
    });
  }

  function spentOf(name){
    var t = 0;
    records.forEach(function(r){ if(r.name === name) t += r.amt; });
    return t;
  }

  function renderSeats(){
    var area = $("seatArea");
    $("seatCountLbl").textContent = seats.length + " 桌";
    if(!seats.length){
      area.innerHTML = '<div class="empty"><div class="big">🪑</div>'+
        '<p>還沒有座位圖<br>在上方輸入桌號與座位數新增一桌</p></div>';
      return;
    }
    var html = "";
    seats.forEach(function(t, ti){
      var filled = t.seats.filter(function(s){ return s; }).length;
      html += '<div class="tbl">'+
        '<div class="tbl-head">'+
          '<span class="n">桌號 '+esc(t.table)+'<small>'+filled+' / '+t.seats.length+' 人</small></span>'+
          '<button class="x" data-rmt="'+ti+'" title="刪除此桌">✕</button>'+
        '</div>'+
        '<div class="round">'+
          '<div class="top"><span class="t1">'+esc(t.table)+'</span><span class="t2">'+t.seats.length+' 席</span></div>';
      var n = t.seats.length;
      var box = window.innerWidth <= 400 ? 250 : 290;
      var R = box/2 - (window.innerWidth <= 400 ? 27 : 31);
      for(var i=0;i<n;i++){
        var ang = (Math.PI*2*i/n) - Math.PI/2;
        var x = box/2 + R*Math.cos(ang);
        var y = box/2 + R*Math.sin(ang);
        var nm = t.seats[i];
        var sp = nm ? spentOf(nm) : 0;
        html += '<div class="seat'+(nm?' filled':'')+'" data-t="'+ti+'" data-s="'+i+'" '+
                'style="left:'+x.toFixed(1)+'px;top:'+y.toFixed(1)+'px">'+
          '<span class="nm">'+(nm? esc(nm) : (i+1))+'</span>'+
          (sp ? '<span class="sp">$'+money(sp)+'</span>' : '')+
        '</div>';
      }
      html += '</div></div>';
    });
    area.innerHTML = html;
    Array.prototype.forEach.call(area.querySelectorAll(".seat"), function(el){
      el.addEventListener("click", function(){
        openSeat(+el.getAttribute("data-t"), +el.getAttribute("data-s"));
      });
    });
    Array.prototype.forEach.call(area.querySelectorAll("[data-rmt]"), function(el){
      el.addEventListener("click", function(){
        var i = +el.getAttribute("data-rmt");
        seats.splice(i,1); saveSeats();
      });
    });
  }

  function addTable(){
    var t = $("sTable").value.trim();
    var c = parseInt($("sCount").value, 10);
    if(!t){ toast("請填寫桌號"); $("sTable").focus(); return; }
    if(isNaN(c) || c < 1 || c > 20){ toast("座位數請填 1–20"); $("sCount").focus(); return; }
    var dup = seats.some(function(x){ return x.table === t; });
    if(dup){ toast("桌號 "+t+" 已存在"); $("sTable").focus(); return; }
    var arr = [];
    for(var i=0;i<c;i++) arr.push("");
    seats.push({ table:t, seats:arr });
    $("sTable").value=""; $("sCount").value="";
    saveSeats();
    toast("已新增桌號 "+t);
  }

  function openSeat(ti, si){
    seatEditing = { t:ti, s:si };
    $("seatTitle").textContent = "桌號 "+seats[ti].table+" · 第 "+(si+1)+" 席";
    $("sName").value = seats[ti].seats[si] || "";
    $("seatMask").hidden = false;
    $("sName").focus();
  }
  function closeSeat(){ seatEditing = null; $("seatMask").hidden = true; }
  function saveSeat(){
    if(!seatEditing) return;
    var t = seats[seatEditing.t];
    if(t) t.seats[seatEditing.s] = $("sName").value.trim();
    closeSeat();
    saveSeats();
  }

  var seatClearArmed = false, seatClearTimer = null;
  function clearSeats(){
    var btn = $("clearSeatBtn");
    if(!seatClearArmed){
      seatClearArmed = true;
      btn.classList.add("confirm");
      btn.textContent = "再按一次確認";
      seatClearTimer = setTimeout(resetSeatClear, 3000);
      return;
    }
    seats = [];
    saveSeats();
    resetSeatClear();
    toast("已清空座位圖");
  }
  function resetSeatClear(){
    seatClearArmed = false;
    clearTimeout(seatClearTimer);
    var btn = $("clearSeatBtn");
    btn.classList.remove("confirm");
    btn.textContent = "清空座位圖";
  }

  function switchPage(p){
    page = p;
    $("pageOrder").hidden = p !== "order";
    $("pageSeat").hidden = p !== "seat";
    Array.prototype.forEach.call($("tabs").children, function(b){
      b.classList.toggle("on", b.getAttribute("data-page") === p);
    });
    if(p === "seat") renderSeats();
  }

  function rowHtml(r){
    var tbl = r.table === "未分桌" ? "未分桌" : "桌 " + r.table;
    var who = r.name === "—" ? "（未填姓名）" : r.name;
    var secondary, primary;
    if(mode === "item"){ secondary = tbl; primary = who; }
    else if(mode === "name"){ secondary = tbl; primary = r.item; }
    else { secondary = who; primary = r.item; }
    return '<div class="item">'+
      '<div><div class="who">'+esc(secondary)+'</div><div class="what">'+esc(primary)+'</div></div>'+
      '<div class="amt mono">$'+money(r.amt)+'</div>'+
      '<div class="ops">'+
        '<button class="edit" data-edit="'+r.id+'" title="編輯">✎</button>'+
        '<button class="del" data-id="'+r.id+'" title="刪除">✕</button>'+
      '</div>'+
    '</div>';
  }

  function exportCSV(){
    if(!records.length){ toast("沒有資料可匯出"); return; }
    var rows = [["桌號","姓名","餐點","金額"]];
    records.forEach(function(r){ rows.push([r.table, r.name, r.item, r.amt]); });
    var grand = records.reduce(function(s,r){ return s + r.amt; },0);
    if(svc){
      var fee = Math.round(grand * SVC_RATE);
      rows.push(["","","餐點小計", grand]);
      rows.push(["","","服務費 10%", fee]);
      rows.push(["","","總計", grand + fee]);
    }else{
      rows.push(["","","總計", grand]);
    }
    var csv = rows.map(function(row){
      return row.map(function(c){
        c = String(c);
        return /[",\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c;
      }).join(",");
    }).join("\r\n");
    var blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var d = new Date();
    var stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
    a.href = url; a.download = "聚餐帳單_"+stamp+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("已匯出 CSV");
  }

  function clearAll(){
    var btn = $("clearBtn");
    if(!clearArmed){
      clearArmed = true;
      btn.classList.add("confirm");
      btn.textContent = "再按一次確認清空";
      clearTimer = setTimeout(resetClear, 3000);
      return;
    }
    if(online){
      apiPost({ action:"clear", bill:billCode })
        .then(function(){ toast("已清空全部紀錄"); poll(); })
        .catch(function(){ toast("清空失敗"); });
      resetClear();
      return;
    }
    records = [];
    save(); render();
    resetClear();
    toast("已清空全部紀錄");
  }
  function resetClear(){
    clearArmed = false;
    clearTimeout(clearTimer);
    var btn = $("clearBtn");
    btn.classList.remove("confirm");
    btn.textContent = "清空全部";
  }

  function updateConnUI(){
    var dot=$("connDot"), status=$("connStatus"), hint=$("connHint");
    if(!backendReady()){
      dot.classList.remove("on");
      status.textContent = "單機模式";
      status.classList.add("off");
      hint.classList.add("warn");
      hint.innerHTML = "尚未設定雲端(<b>API_URL</b>),資料只存在這台裝置。";
      return;
    }
    hint.classList.remove("warn");
    hint.innerHTML = "所有人開啟這個網頁即共用同一份帳單,約每 3 秒自動同步。";
    if(online){
      dot.classList.add("on");
      status.textContent = "已同步到雲端";
      status.classList.remove("off");
    }else{
      dot.classList.remove("on");
      status.textContent = "連線中…";
      status.classList.add("off");
    }
  }

  function apiPost(payload){
    return fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); });
  }

  function poll(){
    if(!online) return;
    fetch(API_URL + "?action=list&bill=" + encodeURIComponent(billCode))
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(!online || (data.bill && data.bill !== billCode)) return;
        records = (data.orders || []).map(function(x){
          return { id:String(x.id), table:x.table, name:x.name, item:x.item, amt:Number(x.amt) };
        });
        svc = !!data.svc;
        if(!seatEditing){
          var incoming = [];
          try{ incoming = data.seats ? JSON.parse(data.seats) : []; }catch(e){ incoming = []; }
          if(Array.isArray(incoming)) seats = incoming;
        }
        render();
        if(page === "seat") renderSeats();
      })
      .catch(function(){ /* 靜默,下一輪重試 */ });
  }

  function teardown(){
    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
  }

  function connect(){
    if(!backendReady()){ updateConnUI(); render(); return; }
    teardown();
    billCode = FIXED_BILL;
    online = true;
    updateConnUI();
    poll();
    pollTimer = setInterval(poll, POLL_MS);
  }

  // 事件
  $("addBtn").addEventListener("click", add);
  [fTable,fName,fItem,fAmt].forEach(function(el){
    el.addEventListener("keydown", function(e){ if(e.key==="Enter") add(); });
  });
  $("seg").addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b) return;
    mode = b.getAttribute("data-mode");
    Array.prototype.forEach.call(this.children, function(c){ c.classList.remove("on"); });
    b.classList.add("on");
    render();
  });
  $("exportBtn").addEventListener("click", exportCSV);
  $("clearBtn").addEventListener("click", clearAll);
  $("svcChk").addEventListener("change", function(){
    svc = this.checked;
    if(online){
      apiPost({ action:"svc", bill:billCode, svc: svc }).catch(function(){ toast("同步失敗"); });
    }else{
      localStorage.setItem("feast-svc", svc ? "1" : "0");
    }
    render();
  });
  $("eSave").addEventListener("click", saveEdit);
  $("eCancel").addEventListener("click", closeEdit);
  $("tabs").addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b) return;
    switchPage(b.getAttribute("data-page"));
  });
  $("addTableBtn").addEventListener("click", addTable);
  [$("sTable"), $("sCount")].forEach(function(el){
    el.addEventListener("keydown", function(e){ if(e.key==="Enter") addTable(); });
  });
  $("clearSeatBtn").addEventListener("click", clearSeats);
  $("sSave").addEventListener("click", saveSeat);
  $("sCancel").addEventListener("click", closeSeat);
  $("seatMask").addEventListener("click", function(e){ if(e.target === this) closeSeat(); });
  $("sName").addEventListener("keydown", function(e){
    if(e.key === "Enter") saveSeat();
    if(e.key === "Escape") closeSeat();
  });
  $("editMask").addEventListener("click", function(e){
    if(e.target === this) closeEdit();
  });
  ["eTable","eName","eItem","eAmt"].forEach(function(id){
    $(id).addEventListener("keydown", function(e){
      if(e.key === "Enter") saveEdit();
      if(e.key === "Escape") closeEdit();
    });
  });

  updateConnUI();
  renderSeats();
  if(backendReady()){
    connect();
  }else{
    render();
  }
})();
</script>
</body>
</html>
