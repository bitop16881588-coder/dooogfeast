<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚餐點餐結算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f1e9;
    --ink:#232019;
    --green:#17493a;
    --green-soft:#e3ede7;
    --amber:#e0952b;
    --amber-deep:#b56f12;
    --danger:#c0492f;
    --line:#cbc4b4;
    --muted:#8b8271;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 30px rgba(35,32,25,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:
      radial-gradient(circle at 20% -10%,#fbf9f3,transparent 55%),
      radial-gradient(circle at 100% 0%,#eef3ef,transparent 45%),
      #ece7db;
    color:var(--ink);
    min-height:100vh;
    padding:24px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:640px;margin:0 auto}

  /* 抬頭 */
  header{text-align:center;margin-bottom:20px}
  .stamp{
    display:inline-block;font-size:12px;letter-spacing:.35em;font-weight:700;
    color:var(--green);border:1.5px solid var(--green);border-radius:4px;
    padding:4px 12px 4px 14px;transform:rotate(-2deg);margin-bottom:14px;
  }
  header h1{font-size:30px;font-weight:900;letter-spacing:.02em;line-height:1.1}
  header .sub{margin-top:8px;color:var(--muted);font-size:13px;font-weight:500}
  header .sub b{color:var(--green);font-weight:700}

  /* 卡片 */
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .card + .card{margin-top:18px}

  /* 輸入區 */
  .entry{padding:18px}
  .entry .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:700;color:var(--muted);padding-left:2px}
  .field input{
    font-family:inherit;font-size:16px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:9px;
    padding:11px 12px;width:100%;transition:border-color .15s,box-shadow .15s;
  }
  .field input.mono{font-family:"JetBrains Mono",monospace}
  .field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(23,73,58,.12)}
  .field.full{margin-top:10px}
  .add-btn{
    margin-top:14px;width:100%;font-family:inherit;font-size:16px;font-weight:700;
    color:#fff;background:var(--green);border:none;border-radius:10px;padding:13px;
    cursor:pointer;transition:transform .05s,background .15s;letter-spacing:.05em;
  }
  .add-btn:hover{background:#0f3a2d}
  .add-btn:active{transform:translateY(1px)}

  /* 分組切換 */
  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 18px;border-bottom:1px dashed var(--line);
  }
  .seg{display:inline-flex;background:var(--green-soft);border-radius:9px;padding:3px}
  .seg button{
    font-family:inherit;font-size:13px;font-weight:700;color:var(--green);
    background:transparent;border:none;border-radius:7px;padding:7px 12px;cursor:pointer;
  }
  .seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .count{font-size:13px;color:var(--muted);font-weight:500}

  /* 明細 */
  .list{padding:6px 0}
  .empty{padding:44px 24px;text-align:center;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:10px}
  .empty p{font-size:14px;line-height:1.6}

  .group-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    padding:14px 18px 8px;
  }
  .group-head .g-name{font-size:15px;font-weight:900;color:var(--green)}
  .group-head .g-name .tag{
    font-size:11px;font-weight:700;color:var(--amber-deep);background:#faf0dc;
    border-radius:20px;padding:2px 9px;margin-left:7px;vertical-align:2px;
  }
  .group-head .g-sub{font-size:14px;font-weight:700;color:var(--muted)}
  .group-head .g-sub b{color:var(--ink)}
  .dashed{border-bottom:1px dashed var(--line);margin:0 18px}

  .item{
    display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;
    padding:11px 18px;
  }
  .item:hover{background:rgba(23,73,58,.03)}
  .item .who{font-size:13px;color:var(--muted);font-weight:500}
  .item .what{font-size:15px;font-weight:500;margin-top:1px}
  .item .amt{font-size:15px;font-weight:700}
  .item .del{
    width:28px;height:28px;border:none;background:transparent;color:var(--muted);
    border-radius:7px;cursor:pointer;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .item .del:hover{background:#f6dfd9;color:var(--danger)}

  /* 總計 */
  .total{background:var(--green);color:#fbf9f3;padding:20px 22px}
  .total .line{display:flex;justify-content:space-between;align-items:center}
  .total .line + .line{margin-top:6px}
  .total .k{font-size:14px;font-weight:500;opacity:.8}
  .total .v{font-size:15px;font-weight:700;opacity:.9}
  .total .grand{border-top:1.5px dashed rgba(255,255,255,.3);margin-top:12px;padding-top:14px}
  .total .grand .k{font-size:16px;font-weight:700;opacity:1}
  .total .grand .v{font-size:34px;font-weight:700;letter-spacing:-.01em}
  .total .grand .v small{font-size:18px;opacity:.7;margin-right:3px}
  .total .line.subtotal .k,.total .line.subtotal .v{opacity:.75}
  .total .line.svc{
    cursor:pointer;user-select:none;margin-top:10px;padding-top:12px;
    border-top:1px dashed rgba(255,255,255,.22);
  }
  .total .line.svc .k{display:flex;align-items:center;gap:10px;opacity:1;font-weight:700}
  .total .line.svc.off .v{opacity:.4}
  .total input[type=checkbox]{
    appearance:none;-webkit-appearance:none;width:20px;height:20px;flex:none;
    border:2px solid rgba(255,255,255,.55);border-radius:6px;background:transparent;
    cursor:pointer;position:relative;transition:.15s;
  }
  .total input[type=checkbox]:checked{background:var(--amber);border-color:var(--amber)}
  .total input[type=checkbox]:checked::after{
    content:"✓";position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;color:var(--green);font-size:13px;font-weight:900;
  }
  .total input[type=checkbox]:focus-visible{outline:2px solid #fbf9f3;outline-offset:2px}

  /* 底部動作 */
  .actions{display:flex;gap:10px;padding:16px 18px}
  .actions button{
    flex:1;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
    border-radius:9px;padding:11px;border:1px solid var(--line);background:#fff;color:var(--ink);
    transition:.15s;
  }
  .actions button:hover{border-color:var(--green);color:var(--green)}
  .actions .clear{color:var(--danger);border-color:#e3c4bc}
  .actions .clear:hover{background:#f6dfd9;border-color:var(--danger);color:var(--danger)}
  .actions .clear.confirm{background:var(--danger);color:#fff;border-color:var(--danger)}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:#fbf9f3;font-size:14px;font-weight:500;
    padding:12px 20px;border-radius:30px;box-shadow:0 8px 24px rgba(0,0,0,.25);
    opacity:0;transition:.28s;pointer-events:none;z-index:50;
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  @media(max-width:480px){
    header h1{font-size:26px}
    .total .grand .v{font-size:29px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="stamp">聚餐帳單</div>
    <h1>聚餐點餐結算</h1>
    <div class="sub" id="metaLine">尚無紀錄</div>
  </header>

  <!-- 輸入 -->
  <div class="card">
    <div class="entry">
      <div class="row">
        <div class="field">
          <label for="fTable">桌號</label>
          <input id="fTable" class="mono" placeholder="1" autocomplete="off">
        </div>
        <div class="field">
          <label for="fName">姓名</label>
          <input id="fName" placeholder="小明" autocomplete="off">
        </div>
      </div>
      <div class="field full">
        <label for="fItem">餐點內容</label>
        <input id="fItem" placeholder="滷肉飯、燙青菜…" autocomplete="off">
      </div>
      <div class="field full">
        <label for="fAmt">金額</label>
        <input id="fAmt" class="mono" type="number" inputmode="decimal" min="0" step="1" placeholder="60" autocomplete="off">
      </div>
      <button class="add-btn" id="addBtn">＋ 新增一筆</button>
    </div>
  </div>

  <!-- 明細 -->
  <div class="card">
    <div class="toolbar">
      <div class="seg" id="seg">
        <button data-mode="table" class="on">依桌號</button>
        <button data-mode="name">依姓名</button>
        <button data-mode="none">全部</button>
      </div>
      <span class="count" id="countLbl">0 筆</span>
    </div>
    <div class="list" id="list"></div>
  </div>

  <!-- 總計 -->
  <div class="card">
    <div class="total">
      <div class="line"><span class="k">餐點筆數</span><span class="v mono" id="tCount">0</span></div>
      <div class="line"><span class="k">用餐桌數</span><span class="v mono" id="tTables">0</span></div>
      <div class="line"><span class="k">用餐人數</span><span class="v mono" id="tPeople">0</span></div>
      <div class="line subtotal" id="subtotalLine" hidden><span class="k">餐點小計</span><span class="v mono"><small>$</small><span id="tSub">0</span></span></div>
      <label class="line svc off" id="svcLine">
        <span class="k"><input type="checkbox" id="svcChk"> 加收服務費 10%</span>
        <span class="v mono"><small>$</small><span id="svcAmt">0</span></span>
      </label>
      <div class="line grand"><span class="k">總計</span><span class="v mono"><small>$</small><span id="tGrand">0</span></span></div>
    </div>
    <div class="actions">
      <button id="exportBtn">匯出 CSV</button>
      <button class="clear" id="clearBtn">清空全部</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var KEY = "feast-orders-v1";
  var records = load();
  var mode = "table";
  var svc = localStorage.getItem("feast-svc") === "1";
  var SVC_RATE = 0.10;
  var clearArmed = false;
  var clearTimer = null;

  var $ = function(id){ return document.getElementById(id); };
  var fTable=$("fTable"), fName=$("fName"), fItem=$("fItem"), fAmt=$("fAmt");

  function load(){
    try{ var r = JSON.parse(localStorage.getItem(KEY)); return Array.isArray(r)? r : []; }
    catch(e){ return []; }
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(records)); }catch(e){}
  }
  function money(n){
    return Math.round(n).toLocaleString("en-US");
  }
  function toast(msg){
    var t=$("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove("show"); },1900);
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function add(){
    var table = fTable.value.trim();
    var name  = fName.value.trim();
    var item  = fItem.value.trim();
    var amt   = parseFloat(fAmt.value);
    if(!item){ toast("請填寫餐點內容"); fItem.focus(); return; }
    if(isNaN(amt) || amt < 0){ toast("請填寫正確金額"); fAmt.focus(); return; }
    records.push({
      id: Date.now() + "-" + Math.random().toString(36).slice(2,6),
      table: table || "未分桌",
      name: name || "—",
      item: item,
      amt: amt
    });
    save();
    // 保留桌號與姓名，方便連續輸入同一人
    fItem.value=""; fAmt.value="";
    fItem.focus();
    render();
    toast("已新增");
  }

  function del(id){
    records = records.filter(function(r){ return r.id !== id; });
    save(); render();
  }

  function groupBy(keyFn){
    var map = {}, order = [];
    records.forEach(function(r){
      var k = keyFn(r);
      if(!map[k]){ map[k]=[]; order.push(k); }
      map[k].push(r);
    });
    return order.map(function(k){ return {key:k, items:map[k]}; });
  }

  function render(){
    var list = $("list");
    var count = records.length;
    var grand = records.reduce(function(s,r){ return s + r.amt; },0);
    var tables = {}, people = {};
    records.forEach(function(r){ tables[r.table]=1; people[r.name==="—"? r.id : r.name]=1; });
    var nTables = Object.keys(tables).length;
    var nPeople = records.filter(function(r){return r.name!=="—";})
                         .reduce(function(m,r){ m[r.name]=1; return m; },{});
    var nPeopleCount = Object.keys(nPeople).length;

    var svcFee = svc ? grand * SVC_RATE : 0;
    var payable = grand + svcFee;

    $("tCount").textContent = count;
    $("tTables").textContent = nTables;
    $("tPeople").textContent = nPeopleCount;
    $("tSub").textContent = money(grand);
    $("svcAmt").textContent = money(svcFee);
    $("tGrand").textContent = money(payable);
    $("subtotalLine").hidden = !svc;
    $("svcChk").checked = svc;
    $("svcLine").classList.toggle("off", !svc);
    $("countLbl").textContent = count + " 筆";
    $("metaLine").innerHTML = count
      ? "共 <b>"+nTables+"</b> 桌 · <b>"+count+"</b> 筆 · 總計 <b>$"+money(payable)+"</b>"
      : "尚無紀錄";

    if(count === 0){
      list.innerHTML =
        '<div class="empty"><div class="big">🍽️</div>'+
        '<p>還沒有點餐紀錄<br>在上方填寫桌號、姓名、餐點與金額開始</p></div>';
      return;
    }

    var html = "";
    if(mode === "none"){
      html += records.map(rowHtml).join("");
    }else{
      var groups = mode === "table"
        ? groupBy(function(r){ return r.table; })
        : groupBy(function(r){ return r.name; });
      groups.forEach(function(g){
        var sub = g.items.reduce(function(s,r){ return s + r.amt; },0);
        var label = mode==="table" ? "桌號 "+esc(g.key) : esc(g.key);
        var tag = mode==="table"
          ? '<span class="tag">'+g.items.length+' 筆</span>'
          : '';
        html += '<div class="group-head">'+
                  '<span class="g-name">'+label+tag+'</span>'+
                  '<span class="g-sub mono">小計 <b>$'+money(sub)+'</b></span>'+
                '</div>'+
                '<div class="dashed"></div>'+
                g.items.map(rowHtml).join("");
      });
    }
    list.innerHTML = html;
    Array.prototype.forEach.call(list.querySelectorAll(".del"), function(btn){
      btn.addEventListener("click", function(){ del(btn.getAttribute("data-id")); });
    });
  }

  function rowHtml(r){
    var who = mode==="name" ? esc(r.table==="未分桌"?"未分桌":"桌 "+r.table)
                            : esc(r.name);
    return '<div class="item">'+
      '<div><div class="who">'+who+'</div><div class="what">'+esc(r.item)+'</div></div>'+
      '<div class="amt mono">$'+money(r.amt)+'</div>'+
      '<button class="del" data-id="'+r.id+'" title="刪除">✕</button>'+
    '</div>';
  }

  function exportCSV(){
    if(!records.length){ toast("沒有資料可匯出"); return; }
    var rows = [["桌號","姓名","餐點","金額"]];
    records.forEach(function(r){ rows.push([r.table, r.name, r.item, r.amt]); });
    var grand = records.reduce(function(s,r){ return s + r.amt; },0);
    if(svc){
      var fee = Math.round(grand * SVC_RATE);
      rows.push(["","","餐點小計", grand]);
      rows.push(["","","服務費 10%", fee]);
      rows.push(["","","總計", grand + fee]);
    }else{
      rows.push(["","","總計", grand]);
    }
    var csv = rows.map(function(row){
      return row.map(function(c){
        c = String(c);
        return /[",\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c;
      }).join(",");
    }).join("\r\n");
    var blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var d = new Date();
    var stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
    a.href = url; a.download = "聚餐帳單_"+stamp+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("已匯出 CSV");
  }

  function clearAll(){
    var btn = $("clearBtn");
    if(!clearArmed){
      clearArmed = true;
      btn.classList.add("confirm");
      btn.textContent = "再按一次確認清空";
      clearTimer = setTimeout(resetClear, 3000);
      return;
    }
    records = [];
    save(); render();
    resetClear();
    toast("已清空全部紀錄");
  }
  function resetClear(){
    clearArmed = false;
    clearTimeout(clearTimer);
    var btn = $("clearBtn");
    btn.classList.remove("confirm");
    btn.textContent = "清空全部";
  }

  // 事件
  $("addBtn").addEventListener("click", add);
  [fTable,fName,fItem,fAmt].forEach(function(el){
    el.addEventListener("keydown", function(e){ if(e.key==="Enter") add(); });
  });
  $("seg").addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b) return;
    mode = b.getAttribute("data-mode");
    Array.prototype.forEach.call(this.children, function(c){ c.classList.remove("on"); });
    b.classList.add("on");
    render();
  });
  $("exportBtn").addEventListener("click", exportCSV);
  $("clearBtn").addEventListener("click", clearAll);
  $("svcChk").addEventListener("change", function(){
    svc = this.checked;
    localStorage.setItem("feast-svc", svc ? "1" : "0");
    render();
  });

  render();
})();
</script>
</body>
</html>
